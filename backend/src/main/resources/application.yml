server:
  port: 7701
  servlet:
    context-path: /api

spring:
  application:
    name: smart-ehs

  web:
    resources:
      add-mappings: false

  datasource:
    # 납품/Yesco 전환: 운영에선 MSSQL_URL/USERNAME/PASSWORD 환경변수로 주입. 미설정 시 현재 개발 DB 기본값.
    url: ${MSSQL_URL:jdbc:sqlserver://211.171.152.242:51084;databaseName=yescoSHE_lab2;encrypt=true;trustServerCertificate=true}
    username: ${MSSQL_USERNAME:com4in}
    password: ${MSSQL_PASSWORD:com4in201!!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:horsehihing3@gmail.com}
    password: ${MAIL_PASSWORD:fxlmjalpsmddwsuv}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# MyBatis Configuration
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.smartehs.model
  type-handlers-package: com.smartehs.config.typehandler
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# HR 인사정보 동기화 (SAP) — 스키마 추가는 항상 적용, 실제 적재는 enabled=true 일 때만(기본 off)
hr-sync:
  enabled: ${HR_SYNC_ENABLED:false}
  cron: ${HR_SYNC_CRON:0 0 4 * * *}          # 매일 04:00 (Asia/Seoul). SAP 확정 시각 이후로 조정
  company-code: ${HR_SYNC_COMPANY_CODE:0100004}
  user-status: ${HR_SYNC_USER_STATUS:0}      # 조회 상태 필터 '0'=전체 (STATUS 매핑표 확정 후 최종)

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation-minimum-32-characters}
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# File Storage Configuration
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  max-size: 104857600  # 100MB

# Microsoft Graph Configuration (for Teams/Email notifications)
microsoft:
  graph:
    client-id: ${AZURE_CLIENT_ID:}
    client-secret: ${AZURE_CLIENT_SECRET:}
    tenant-id: ${AZURE_TENANT_ID:}

# Logging
logging:
  level:
    # 운영/Yesco: LOG_LEVEL_SQL=WARN 등으로 낮출 것. TRACE 는 SQL·파라미터·결과를 전부 찍어 무겁고 민감정보 누출 위험.
    root: ${LOG_LEVEL_ROOT:INFO}
    com.smartehs: ${LOG_LEVEL_APP:DEBUG}
    com.smartehs.mapper: ${LOG_LEVEL_SQL:TRACE}         # MyBatis SQL + parameters + result rows
    jdbc.sqltiming: ${LOG_LEVEL_SQL:DEBUG}
    org.springframework.jdbc.core: ${LOG_LEVEL_SQL:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Frontend URL (for email links)
app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:7700}
  # CORS 허용 오리진(쉼표 구분). Yesco 전환 시 APP_CORS_ALLOWED_ORIGINS 로 교체.
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:7700,http://localhost:7600,http://localhost:3000,http://localhost:5173,http://211.171.152.242:7600,http://ehs.com4in.com:7600,https://ehs.com4in.com,http://she.com4in.com,https://she.com4in.com}

# Translation Configuration
translation:
  enabled: true

# 법제처 국가법령정보센터 OpenAPI
# OC(기관코드): https://open.law.go.kr 회원가입 시 이메일 ID(@앞)가 OC
# 등록 IP에서만 호출 가능. 환경변수 LAW_API_OC 로 override 가능.
law-api:
  oc: ${LAW_API_OC:com4in}

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
