server:
  port: 7501
  servlet:
    context-path: /api

spring:
  application:
    name: smart-ehs

  web:
    resources:
      add-mappings: false

  datasource:
    # 납품/Yesco 전환: 운영에선 MSSQL_URL/USERNAME/PASSWORD 환경변수로 주입. 미설정 시 현재 개발 DB 기본값.
    url: ${MSSQL_URL:jdbc:sqlserver://211.171.152.242:51084;databaseName=SmartEHS_com4in;encrypt=true;trustServerCertificate=true}
    username: ${MSSQL_USERNAME:com4in}
    password: ${MSSQL_PASSWORD:com4in201!!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:horsehihing3@gmail.com}
    password: ${MAIL_PASSWORD:fxlmjalpsmddwsuv}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# MyBatis Configuration
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.smartehs.model
  type-handlers-package: com.smartehs.config.typehandler
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation-minimum-32-characters}
  expiration: 86400000  # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# File Storage Configuration
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  max-size: 104857600  # 100MB

# Microsoft Graph Configuration (for Teams/Email notifications)
microsoft:
  graph:
    client-id: ${AZURE_CLIENT_ID:}
    client-secret: ${AZURE_CLIENT_SECRET:}
    tenant-id: ${AZURE_TENANT_ID:}

# Logging
logging:
  level:
    root: INFO
    com.smartehs: DEBUG
    com.smartehs.mapper: TRACE         # MyBatis SQL + parameters + result rows
    jdbc.sqltiming: DEBUG
    org.springframework.jdbc.core: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Frontend URL (for email links)
app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:7500}
  # CORS 허용 오리진(쉼표 구분). Yesco 전환 시 APP_CORS_ALLOWED_ORIGINS 로 교체.
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:7500,http://localhost:3000,http://localhost:5173,http://211.171.152.242:7500,http://ehs.com4in.com:7500,https://ehs.com4in.com}

# Translation Configuration
translation:
  enabled: true

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
