# MSSQL Production Configuration
# 사용법: --spring.profiles.active=mssql

spring:
  datasource:
    url: jdbc:sqlserver://${MSSQL_HOST:localhost}:${MSSQL_PORT:1433};databaseName=${MSSQL_DATABASE:SmartEHS};encrypt=true;trustServerCertificate=true
    username: ${MSSQL_USERNAME:sa}
    password: ${MSSQL_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration/mssql
    baseline-on-migrate: true
    validate-on-migrate: true

# Logging for production
logging:
  level:
    root: INFO
    com.smartehs: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
